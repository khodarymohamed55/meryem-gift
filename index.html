<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هدية لمريومتي</title>
    <style>
        body { background: linear-gradient(135deg, #fdf5f5, #f8bbd0); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        #main-content { display: none; }
        h1 { color: #d63384; }
        input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 80%; margin-bottom: 10px; }
        button { background: #d63384; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        #timer { font-size: 18px; font-weight: bold; color: #d63384; background: #fff0f5; padding: 15px; border-radius: 15px; margin: 15px 0; border: 2px dashed #d63384; }
        .gallery img { width: 100%; max-width: 250px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>أهلاً يا مريومتي ❤️</h1>
        <input type="password" id="pass" placeholder="كلمة السر">
        <br>
        <button onclick="check()">فتح الهدية</button>
    </div>

    <div class="container" id="main-content">
        <h1>مر على حبنا:</h1>
        <div id="timer">...</div>
        
        <!-- مشغل أغنية جديد -->
        <p style="font-size: 12px; color: #666;">اضغطي زر التشغيل للأغنية:</p>
        <audio controls style="width: 100%;">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <div class="gallery">
            <img src="IMG-20260425-WA0000.jpg" alt="صورة">
            <p>تاهت عيوني في بحور عيونها.</p>
            <!-- باقي الصور بنفس الترتيب -->
        </div>
    </div>

    <script>
        function check() {
            if (document.getElementById("pass").value === "Roma") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                startTimer();
            } else { alert("كلمة السر غلط!"); }
        }

        function startTimer() {
            const startDate = new Date("2021-07-19T00:00:00");
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const d = Math.floor(diff / (1000*60*60*24));
                const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                const s = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById("timer").innerHTML = `${d} يوم<br>${h} ساعة : ${m} دقيقة : ${s} ثانية`;
            }, 1000);
        }
    </script>
</body>
</html>
