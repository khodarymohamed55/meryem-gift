<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية لمريومتي</title>
    <style>
        body { background: linear-gradient(135deg, #fdf5f5, #f8bbd0); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; }
        #main-content { display: none; }
        h1 { color: #d63384; }
        input { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid #fce4e4; border-radius: 10px; text-align: center; font-size: 16px; }
        button { background-color: #d63384; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        #timer { font-size: 24px; font-weight: bold; color: #d63384; margin: 20px 0; }
    </style>
</head>
<body>

    <!-- صفحة الدخول -->
    <div class="container" id="login-screen">
        <h1>أهلاً يا مريومتي ❤️</h1>
        <p>أدخلي كلمة السر لفتح الهدية</p>
        <input type="password" id="pass" placeholder="كلمة السر">
        <br>
        <button onclick="check()">فتح الهدية</button>
    </div>

    <!-- صفحة المحتوى -->
    <div class="container" id="main-content">
        <h1>بحبك يا مريومتي ❤️</h1>
        <p>مر على حبنا:</p>
        <div id="timer"></div>
        <!-- الأغنية موجودة هنا مخفية وهتشتغل أوتوماتيك -->
        <audio id="bg-music" src="song.mp3" loop></audio>
    </div>

    <script>
        function check() {
            if (document.getElementById("pass").value === "Roma") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                
                // تشغيل الأغنية أوتوماتيك بمجرد فتح الصفحة
                document.getElementById('bg-music').play();
                
                updateCounter();
            } else {
                alert("كلمة السر غلط يا عمري، حاولي تاني!");
            }
        }

        function updateCounter() {
            let startDate = new Date("2021-07-19T00:00:00");
            let now = new Date();
            let diff = now - startDate;
            let years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
            let days = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerHTML = years + " سنة و " + days + " يوم";
        }
    </script>
</body>
</html>
