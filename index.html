<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: linear-gradient(135deg, #fdf5f5, #f8bbd0); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%; max-width: 450px; }
        #main-content { display: none; }
        h1 { color: #d63384; }
        
        /* تصميم العداد المميز */
        #timer { 
            font-size: 22px; font-weight: bold; color: #fff; 
            background: linear-gradient(45deg, #d63384, #ff80ab); 
            padding: 20px; border-radius: 20px; margin: 20px 0;
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* مشغل أغنية شيك */
        audio { width: 100%; border-radius: 50px; margin-top: 10px; }
        
        /* الصور */
        .gallery img { width: 100%; border-radius: 20px; margin-top: 15px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>أهلاً يا مريومتي ❤️</h1>
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="check()">فتح الهدية</button>
    </div>

    <div class="container" id="main-content">
        <h1>مر على حبنا:</h1>
        <div id="timer">جاري التحميل...</div>
        
        <audio controls id="bg-music">
            <source src="ambtgherm.mp3" type="audio/mpeg">
        </audio>

        <div class="gallery">
            <img src="your-image1.jpg" alt="حبنا">
            <p>كل لحظة معاكي هي أجمل أيام عمري ❤️</p>
        </div>
    </div>

    <script>
        function check() {
            if (document.getElementById("pass").value === "Roma") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                document.getElementById('bg-music').play();
                startTimer();
            } else { alert("كلمة السر غلط يا عمري!"); }
        }

        function startTimer() {
            const startDate = new Date("2021-07-19T00:00:00");
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const d = Math.floor(diff / (1000*60*60*24));
                const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                const s = Math.floor((diff % (1000*60)) / 1000);
                document.getElementById("timer").innerHTML = `${d} يوم<br>${h} ساعة : ${m} دقيقة : ${s} ثانية`;
            }, 1000);
        }
    </script>
</body>
</html>
